id: "2026-04-15-wang-zengqi-kunmingdeyu-01"
title: "昆明的雨 (节选)"
author: "汪曾祺"
source:
  book: "汪曾祺散文集"
  publisher: "人民文学出版社"
  edition: "2005年版"
  page: null
  source_type: registry
  registry_entry_id: "src-005"

content_zh: |
  昆明的雨季是明亮的、丰满的，使人动情的。城春草木深，孟夏草木长。昆明的雨季，是浓绿的。

content_en:
  text: null
  translator: "Martin Woesler"
  publisher: "Bochum University Press"
  reference_pointer: "See 'The Chinese Essay in the 20th Century' (Bochum University Press, 2000), pp. 138-141, ISBN 3934453147"

expression_patterns:
  - technique_id: "listing"
    example: "明亮的、丰满的，使人动情的"
    explanation_zh: "连续用三个词来形容雨季，一个比一个深入——从眼睛看到的，到身体感受的，再到心里的"
    explanation_en: "Three qualities in escalating sequence — from visual brightness, to physical fullness, to emotional stirring"
    practice_prompt_zh: "用三个词来形容你最喜欢的季节，一个比一个深入"
    practice_prompt_en: "Describe your favorite season with three words, each going deeper"
  - technique_id: "short-sentence"
    example: "昆明的雨季，是浓绿的。"
    explanation_zh: "最后一句特别短，像盖章一样，把整段的意思浓缩成一个颜色"
    explanation_en: "The final sentence is deliberately brief — stamping the whole passage with a single vivid color"
    practice_prompt_zh: "先写两句长句描述一个地方，再用一句特别短的句子总结"
    practice_prompt_en: "Write two longer sentences describing a place, then sum it up with one very short sentence"

