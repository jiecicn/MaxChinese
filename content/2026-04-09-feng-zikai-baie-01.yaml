id: "2026-04-09-feng-zikai-baie-01"
title: "白鹅 (节选)"
author: "丰子恺"
source:
  book: "丰子恺散文集"
  publisher: "人民文学出版社"
  edition: "人教版四年级下册课文版本"
  page: null
  source_type: registry
  registry_entry_id: "src-004"

content_zh: |
  鹅的步态，更是傲慢了。大体上与鸭相似，但鸭的步调急速，有局促不安之相；鹅的步调从容，大模大样的，颇像京剧里的净角出场。

content_en:
  text: null
  translator: null
  publisher: null
  reference_pointer: "Check 'A Feng Zikai Reader' (English edition) or 'The Chinese Essay' (Columbia University Press, ed. David Pollard)"

expression_patterns:
  - technique_id: "personification"
    example: "傲慢"
    explanation_zh: "用描写人的词语来形容鹅，好像鹅也有人的态度和脾气"
    explanation_en: "Using a human word ('arrogant') to describe the goose, as if it has a human personality"
    practice_prompt_zh: "用一个描写人的词来形容你见过的一种动物"
    practice_prompt_en: "Use a word that normally describes people to describe an animal you've seen"
  - technique_id: "antithesis"
    example: "鸭的步调急速，有局促不安之相；鹅的步调从容，大模大样的"
    explanation_zh: "把鸭和鹅放在一起比较，一个急匆匆，一个慢悠悠，突出鹅的从容"
    explanation_en: "Comparing duck and goose side by side — one hurried, one stately — highlighting the goose's composure"
    practice_prompt_zh: "选两种动物，用对比的方法描写它们的不同"
    practice_prompt_en: "Pick two animals and use contrast to describe how they differ"
  - technique_id: "simile"
    example: "颇像京剧里的净角出场"
    explanation_zh: "把鹅走路的样子比作京剧演员出场，画面感很强"
    explanation_en: "Comparing the goose's walk to a Beijing opera character entering the stage — creates a vivid image"
    practice_prompt_zh: "用'像……'来形容一种动物做某件事的样子"
    practice_prompt_en: "Use 'like...' to describe how an animal does something"

