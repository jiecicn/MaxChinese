id: "2026-04-15-xiao-hong-hulanhe-01"
title: "呼兰河传 (节选)"
author: "萧红"
source:
  book: "呼兰河传"
  publisher: "人民文学出版社"
  edition: "部编版五年级课文版本"
  page: null
  source_type: registry
  registry_entry_id: "src-019"

content_zh: |
  花开了，就像花睡醒了似的。鸟飞了，就像鸟上天了似的。虫子叫了，就像虫子在说话似的。一切都活了。都有无限的本领，要做什么，就做什么。要怎么样，就怎么样。都是自由的。

content_en:
  text: null
  translator: "Howard Goldblatt"
  publisher: "Cheng & Tsui Company"
  reference_pointer: "See 'Tales of Hulan River' (Cheng & Tsui, 2002, ISBN 978-0-887273-92-6), Chapter 3"

expression_patterns:
  - technique_id: "parallelism"
    example: "花开了，就像...鸟飞了，就像...虫子叫了，就像..."
    explanation_zh: "三个句子结构完全一样，一个接一个，像波浪一样推过来，越读越有劲"
    explanation_en: "Three identically structured sentences roll in one after another like waves, building momentum with each repetition"
    practice_prompt_zh: "用'……了，就像……似的'写三个排比句，描述春天的变化"
    practice_prompt_en: "Write three parallel sentences using '...just like...' to describe changes in spring"
  - technique_id: "personification"
    example: "花睡醒了...虫子在说话"
    explanation_zh: "花会睡觉，虫子会说话——用小孩子的眼光看世界，一切都是活的"
    explanation_en: "Flowers sleeping, bugs talking — seeing the world through a child's eyes, where everything is alive"
    practice_prompt_zh: "假装你是一个小小孩，用拟人的方法描述花园里的三样东西"
    practice_prompt_en: "Pretend you're a little kid and use personification to describe three things in a garden"

