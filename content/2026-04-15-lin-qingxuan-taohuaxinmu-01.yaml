expression_patterns:
  - technique_id: "emotion-through-object"
    example: "不只是树，人也是一样"
    explanation_zh: "前面一直在写树，现在突然说人也一样——用树的故事来讲做人的道理"
    explanation_en: "After talking about trees the whole time, suddenly saying people are the same — using a tree's story to teach a life lesson"
    practice_prompt_zh: "选一种植物，先描写它怎么生长，再说说人可以从它身上学到什么"
    practice_prompt_en: "Pick a plant, describe how it grows, then say what people can learn from it"
  - technique_id: "contrast-transition"
    example: "不只是树，人也是一样"
    explanation_zh: "话题从树转到人，一句话就把整篇文章的意思升华了"
    explanation_en: "The topic pivots from trees to people — one sentence elevates the whole essay's meaning"
    practice_prompt_zh: "写一段话先说一样东西，再用'不只是……也是……'转到另一个话题"
    practice_prompt_en: "Write about one thing, then use 'not just...also...' to pivot to a deeper topic"
  - technique_id: "antithesis"
    example: "很少的养分转化为巨大的能量"
    explanation_zh: "'很少'和'巨大'放在一起，形成强烈对比，说明逆境能激发潜力"
    explanation_en: "'Very little' and 'enormous' placed side by side create a sharp contrast, showing that adversity can unlock potential"
    practice_prompt_zh: "用对比写一个句子，把小的东西和大的东西放在一起"
    practice_prompt_en: "Write a sentence using contrast, putting something small next to something big"

