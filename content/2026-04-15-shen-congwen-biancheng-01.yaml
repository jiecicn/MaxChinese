id: "2026-04-15-shen-congwen-biancheng-01"
title: "边城 (节选)"
author: "沈从文"
source:
  book: "边城"
  publisher: "人民文学出版社"
  edition: "2000年版"
  page: null
  source_type: registry
  registry_entry_id: "src-018"

content_zh: |
  小溪流下去，绕山岨流，约三里便汇入茶峒的大河。人若过溪越小山走去，则只一里路就到了茶峒城边。溪流如弓背，山路如弓弦，故远近有了小小差异。

content_en:
  text: null
  translator: "Jeffrey C. Kinkley"
  publisher: "Harper Perennial"
  reference_pointer: "See 'Border Town: A Novel' (Harper Perennial, 2009, ISBN 978-0-06-143691-8), Chapter 1"

expression_patterns:
  - technique_id: "simile"
    example: "溪流如弓背，山路如弓弦"
    explanation_zh: "把弯弯的溪流比作弓背，把直直的山路比作弓弦——一弯一直，画面一下子就清楚了"
    explanation_en: "Comparing the curving stream to a bow's back and the straight mountain path to its string — one curved, one straight, instantly clear"
    practice_prompt_zh: "找一样弯的东西和一样直的东西，用比喻把它们联系起来"
    practice_prompt_en: "Find something curved and something straight, and use a simile to connect them"
  - technique_id: "scene-setting"
    example: "小溪流下去，绕山岨流，约三里便汇入茶峒的大河"
    explanation_zh: "用地理位置和距离来描写环境，让读者像看地图一样了解这个地方"
    explanation_en: "Using geography and distances to paint the setting, so the reader can picture the place like looking at a map"
    practice_prompt_zh: "描述你家附近的一条路或一条河，写出它经过哪些地方"
    practice_prompt_en: "Describe a road or river near your home, writing where it goes"

