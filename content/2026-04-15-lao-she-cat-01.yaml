expression_patterns:
  - technique_id: "personification"
    example: "无忧无虑，什么事也不过问"
    explanation_zh: "用描写人的词来写猫，好像猫也会故意偷懒、不管事"
    explanation_en: "Using human attitudes ('carefree', 'doesn't bother with anything') to describe the cat, as if it deliberately chooses to be lazy"
    practice_prompt_zh: "用拟人的手法写一写你家的宠物或你见过的小动物"
    practice_prompt_en: "Use personification to describe a pet or animal you've seen"
  - technique_id: "contrast-transition"
    example: "说它老实吧...可是，它决定要出去玩玩"
    explanation_zh: "先说猫很乖，再话锋一转说它会离家出走——两面性格形成反差"
    explanation_en: "First saying the cat is obedient, then turning with 'but' to reveal it runs away — the two sides of its personality create a vivid contrast"
    practice_prompt_zh: "用'……可是……'写一个人或动物性格的两面"
    practice_prompt_en: "Use '...but...' to describe two sides of a person's or animal's personality"

