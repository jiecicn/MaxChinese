id: "2026-04-15-lao-she-cat-01"
title: "猫 (节选)"
author: "老舍"
source:
  book: "老舍散文集"
  publisher: "人民文学出版社"
  edition: "部编版四年级下册课文版本"
  page: null
  source_type: registry
