  reference_pointer: >
    No published English translation of 郑振铎's essay《海燕》(or its textbook
    excerpt《燕子》) was found. Zheng Zhenduo is primarily known in English-language
    scholarship as a literary historian and translator (of Tagore, Greek myths,
    etc.), not as an essayist. His original prose works do not appear in major
    English-language anthologies of modern Chinese literature. A possible location
    would be academic anthologies of modern Chinese prose used in Chinese language
    teaching programs, or companion materials for the 人教版 primary school
    curriculum. Search terms: "Zheng Zhenduo Swallows English translation",
    "郑振铎 海燕 English".
