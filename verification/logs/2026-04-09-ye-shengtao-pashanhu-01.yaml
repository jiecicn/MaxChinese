content_id: "2026-04-09-ye-shengtao-pashanhu-01"
verified_date: "2026-04-09"

text_verification:
  status: partially_verified
  method: "Web search for exact passage across multiple Chinese education sites (Baidu Baike, ruiwen.com, guojiajiaoyu.com, blog.sina.com.cn). Cross-referenced multiple sources of the full original text."
  notes: >
    The passage is confirmed to be from the second paragraph of 叶圣陶《爬山虎的脚》,
    a well-known primary school text (人教版/部编版四年级上册, 沪教版三年级上册).
    Minor punctuation discrepancy: the proposed text uses a comma (，) after
    "看着非常舒服" merging two sentences, whereas the standard textbook original
    uses a period (。) creating a sentence break before "叶尖一顺儿朝下". The
    wording of the characters themselves is accurate. Recommend correcting the
    comma to a period to match the published original.

attribution_check:
  author_confirmed: true
  publisher_confirmed: true
  notes: >
    叶圣陶 (1894-1988) is confirmed as the author. The essay 《爬山虎的脚》 is
    widely attributed to him and is a staple of Chinese primary school curricula.
    人民文学出版社 has published 《叶圣陶散文集》, and the source registry entry
    src-020 explicitly lists this essay. The essay also appears in the 人教版
    and 部编版 textbooks published by 人民教育出版社.

technique_verification:
  - technique_id: "detail-focus"
    verdict: kept
    note: >
      The example "叶尖一顺儿朝下，在墙上铺得那么均匀，没有重叠起来的，也不留一点儿空隙"
      is a clear instance of 细节描写 (detail focus). The author zooms in on the
      precise arrangement of the leaves — their uniform direction, even spacing,
      lack of overlap, and absence of gaps. This is textbook detail-focus technique:
      a small physical detail (leaf arrangement) is observed with extraordinary
      precision, revealing the author's careful observation and the plant's
      remarkable orderliness. Correctly identified.

  - technique_id: "simile"
    verdict: deleted
    note: >
      The example "一墙的叶子就漾起波纹" was proposed as a simile comparing leaf
      movement to water ripples. However, this is NOT a standard simile (明喻).
      A simile requires an explicit comparison marker (像, 好像, 仿佛, 如同, etc.)
      which is absent here. The verb "漾" (to ripple) is transferred directly from
      the water domain to describe leaves, making this an implicit metaphor (暗喻)
      or more precisely a case of verb-as-adjective / creative word transfer.
      While 暗喻 is a subcategory of 比喻 in Chinese rhetoric, the technique
      registry defines "simile" as "用一个事物来比另一个事物" which implies an
      explicit comparative structure. The classification is imprecise and could
      mislead the learner. Per verification rules, deleting due to doubt about
      the accuracy of the technique label.

english_translation:
  found: false
  translator: null
  publisher: null
  reference_pointer: >
    No published English translation of 《爬山虎的脚》 specifically was found from
    a major publisher. Community/amateur translations exist online (e.g., a
    Zhihu post by alexcwlin). For professionally published Ye Shengtao essays
    in English, check: (1) "The Chinese Essay" ed. David Pollard, Columbia
    University Press, 2000 — contains some Ye Shengtao essays but not confirmed
    to include this one; (2) "A Ye Shengtao Reader" trans. Zhang Bojun, China
    Intercontinental Press, 2013 — may contain this essay; (3) "A Garden of
    One's Own: A Collection of Modern Chinese Essays, 1919-1949", Chinese
    University Press, 2012. Recommend checking these volumes for a published
    translation of this specific essay.
